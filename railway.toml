[build]
builder = "NIXPACKS"

[deploy]
startCommand = "ok=0; for i in 1 2 3 4 5 6 7 8; do if uv run alembic -c backend/alembic.ini upgrade head; then ok=1; break; fi; echo \"Database not ready yet, retrying migration in 3s ($i/8)...\"; sleep 3; done; if [ \"$ok\" -ne 1 ]; then echo \"Migration failed after retries\"; exit 1; fi; uv run uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
