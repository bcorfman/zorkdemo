[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uv run alembic -c backend/alembic.ini upgrade head && uv run uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
