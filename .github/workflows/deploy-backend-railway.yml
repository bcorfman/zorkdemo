name: Deploy Backend to Railway

on:
  push:
    branches: ["main"]
    paths:
      - "adventure/**"
      - "backend/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-backend-railway.yml"
      - "railway.toml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Railway CLI
        shell: bash
        run: |
          set -euo pipefail
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

          for attempt in 1 2 3; do
            if npm install -g @railway/cli; then
              railway --version
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Railway CLI install failed after $attempt attempts"
              exit 1
            fi

            sleep $((attempt * 15))
          done

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_SERVICE }}
        run: railway up --service "$RAILWAY_SERVICE" --detach

      - name: Health check
        if: ${{ vars.BACKEND_HEALTHCHECK_URL != '' }}
        run: curl -fsS "${{ vars.BACKEND_HEALTHCHECK_URL }}"
